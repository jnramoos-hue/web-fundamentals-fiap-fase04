<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo textarea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/input-textarea.css">
</head>
<body>
<main>
    <form name="form-cadastro" id="form-cadastro" method="post" action="endereco-da-aplicacao">
        <section class="form-campos">
            <label for="mensagem">Digite sua mensagem:</label>
            <textarea name="mensagem" id="mensagem" placeholder="Ex: Eu gostaria de..."></textarea>
        </section>
        <div class="btn-container">
            <button type="submit" id="enviar-mensagem" name="enviar-mensagem" class="btn">Enviar mensagem</button>
        </div>
    </form>
</main>
</body>
</html>
