<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Link para o Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Link para o CSS -->
    <link rel="stylesheet" href="../css/input-file.css">
</head>
<body>
    <main>
        <form>
            <fieldset>
                <legend>Escolha a cor de fundo</legend>
                <section class="form-campos">
                    <div>
                        <label for="file">Clique para enviar o arquivo</label>
                        <input type="file" id="file" name="cor" value="14badb">
                    </div>
                </section>
            </fieldset>
            <div class="btn-container">
                <button type="submit" id="aplicar-cor" name="aplicar-cor" class="btn">Clique aqui para enviar</button>

            </div>
        </form>
    </main>
</body>
</html>
